<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Phone</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Codex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部状态栏 -->
    <header class="header">
        <div class="header-left">
            <span class="logo">⌘ Codex</span>
            <button class="hdr-btn" id="newThreadBtn">+ New</button>
            <div class="thread-dropdown-wrap">
                <button class="hdr-btn" id="historyBtn">📋</button>
                <div class="thread-dropdown" id="threadDropdown">
                    <div class="thread-dropdown-header">Recent Threads</div>
                    <div class="thread-list" id="threadList"></div>
                </div>
            </div>
        </div>
        <div class="header-right">
            <select class="model-select" id="modelSelect">
                <option value="gpt-5.4">5.4</option>
            </select>
            <div class="quota-badge" id="quotaBadge" title="Click to refresh">
                <span class="quota-bar"><span class="quota-fill" id="quotaFill"></span></span>
                <span class="quota-text" id="quotaText">--</span>
            </div>
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- 聊天区域 -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-content" id="chatContent">
            <div class="welcome-state">
                <div class="welcome-icon">⌘</div>
                <h2>Codex Phone</h2>
                <p>Send a message to start coding</p>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-section">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Message Codex..." rows="1"></textarea>
            <button class="voice-btn" id="voiceBtn" aria-label="Voice">
                <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"/><line x1="12" y1="19" x2="12" y2="23" style="stroke:currentColor;stroke-width:2;stroke-linecap:round"/></svg>
                <svg class="mic-off-icon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="14" height="14" rx="3" fill="currentColor" opacity="0.6"/><line x1="4" y1="4" x2="20" y2="20" style="stroke:currentColor;stroke-width:2.5;stroke-linecap:round"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" aria-label="Send">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                        style="fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;" />
                </svg>
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
